[workspace]
members = [
    ".",
    "crates/effects-data",
    "crates/er-quickload-rs",
    "crates/er-runtime",
    "crates/er-safe-input",
    "crates/er-save-loader",
    "crates/soulsformats",
    "tools/er-param-inspect",
]
resolver = "2"

[package]
name = "er-effects-rs"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
er-runtime = { path = "crates/er-runtime" }

[patch."https://github.com/veeenu/hudhook"]
hudhook = { git = "https://github.com/Banon-Labs/hudhook", branch = "er-proton-cursor-poll" }
