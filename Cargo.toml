[workspace]
members = [
    ".",
    "crates/effects-data",
    "crates/er-gfx",
    "crates/er-safe-input",
    "crates/er-save-loader",
    "crates/er-tpf",
    "crates/soulsformats",
    "tools/er-param-inspect",
]
resolver = "2"

[package]
name = "er-effects-rs"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
eldenring = { path = "../fromsoftware-rs/crates/eldenring" }
er-effects-data = { path = "crates/effects-data" }
er-save-loader = { path = "crates/er-save-loader" }
er-safe-input = { path = "crates/er-safe-input" }
# In-memory texture-payload builder: portrait pixels -> uncompressed R8G8B8A8 DDS -> TPF003 blob,
# fed to the game's in-memory TPF factory to replace the now-loading background. Pure-Rust, std-only.
er-tpf = { path = "crates/er-tpf" }
fromsoftware-shared = { path = "../fromsoftware-rs/crates/shared" }
bitflags = "2"
# In-process x86-64 decoding (instruction lengths, prologue/pattern validation).
# Pure-Rust decoder used directly so the hand-rolled single-step/prologue logic in lib.rs
# can decode instead of hard-coding byte lengths. Lean feature set: decoder only, no
# formatters/encoder.
iced-x86 = { version = "1.21", default-features = false, features = ["std", "decoder"] }
# Boot profiler, Win32 process/window helpers, and MinHook target resolution.
windows = { version = "0.62", features = [
    "Win32_Foundation",
    "Win32_System_Threading",
    "Win32_System_WindowsProgramming",
    "Win32_System_Kernel",
    "Win32_System_Diagnostics_ToolHelp",
    "Win32_System_Diagnostics_Debug",
    "Win32_System_SystemInformation",
    "Win32_Devices_HumanInterfaceDevice",
    "Win32_System_LibraryLoader",
    "Win32_System_Memory",
    "Win32_System_SystemServices",
    "Win32_UI_WindowsAndMessaging",
] }

[build-dependencies]
cc = "1.0"
