name: check

on:
  push:
  pull_request:

env:
  # Commit of vswarte/fromsoftware-rs the workspace is developed against.
  # The root crate uses `../fromsoftware-rs` path dependencies, so the
  # workspace cannot even be loaded by cargo without this sibling checkout.
  FROMSOFTWARE_RS_REV: 902851865d05069eda7dcfd6385c8881eadf29bf

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out fromsoftware-rs as sibling
        run: |
          git clone https://github.com/vswarte/fromsoftware-rs.git "$GITHUB_WORKSPACE/../fromsoftware-rs"
          git -C "$GITHUB_WORKSPACE/../fromsoftware-rs" checkout "$FROMSOFTWARE_RS_REV"

      - name: Check out MinHook vendor source
        run: git clone --depth 1 --branch v1.3.4 https://github.com/TsudaKageyu/minhook.git vendor/minhook

      - name: Install Rust (stable + windows target)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup target add x86_64-pc-windows-msvc
          cargo install cargo-xwin --locked

      - name: Install OPA policy engine
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: Install Cupcake policy checker
        run: cargo install --git https://github.com/eqtylab/cupcake.git --rev 27b94b8 cupcake-cli --locked

      - uses: Swatinem/rust-cache@v2

      - name: Lint - no lossy UTF-8
        run: python3 scripts/check-no-lossy-utf8.py

      - name: Lint - no timeout/sleep control flow
        run: |
          python3 scripts/check-no-timeouts.py
          python3 scripts/test-no-timeouts.py
          cupcake validate --log-level error
          python3 scripts/test-cupcake-policies.py

      - name: rustfmt
        run: cargo fmt -- --check

      - name: Test host-buildable crates
        run: cargo test -p er-soulsformats -p er-param-inspect

      # Full link of the DLL needs the MSVC linker; cargo-xwin provides the
      # Windows SDK import libraries needed for Linux-hosted type-checks.
      - name: Check DLL crate (windows target)
        run: cargo xwin check --target x86_64-pc-windows-msvc
